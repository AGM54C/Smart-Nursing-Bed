<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音陪聊 · 智能护理病床</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.88em' font-size='90'>⚕</text></svg>">
    <style>
        .voice-container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* Chat messages area */
        .chat-area {
            background: var(--snow);
            border-radius: var(--r-xl);
            border: 1px solid var(--border);
            min-height: 380px;
            max-height: 55vh;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-msg {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: msgFadeIn .35s ease-out;
        }

        .chat-msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .chat-msg.assistant {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: var(--r-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .msg-avatar.user-av {
            background: var(--teal-100);
            color: var(--teal-600);
        }

        .msg-avatar.ai-av {
            background: linear-gradient(135deg, var(--plum-100), var(--coral-100));
            color: var(--plum-500);
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: .88rem;
            line-height: 1.7;
            position: relative;
        }

        .user .msg-bubble {
            background: linear-gradient(135deg, var(--primary), var(--teal-500));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .msg-bubble {
            background: white;
            color: var(--ink);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: .68rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .user .msg-time {
            text-align: right;
        }

        @keyframes msgFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Voice input area */
        .voice-input-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 16px;
            padding: 12px 16px;
            background: white;
            border-radius: var(--r-xl);
            border: 1px solid var(--border);
            box-shadow: 0 2px 12px rgba(0, 0, 0, .04);
        }

        .voice-input-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: .9rem;
            background: transparent;
            color: var(--ink);
        }

        .voice-input-bar input::placeholder {
            color: var(--text-muted);
        }

        /* Record button */
        .btn-record {
            width: 48px;
            height: 48px;
            border-radius: var(--r-full);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all .25s ease;
            position: relative;
            background: linear-gradient(135deg, var(--coral-400), var(--coral-500));
            color: white;
            box-shadow: 0 3px 12px rgba(232, 115, 74, .25);
        }

        .btn-record:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 18px rgba(232, 115, 74, .35);
        }

        .btn-record.recording {
            background: linear-gradient(135deg, #e85454, #d03030);
            animation: recordPulse 1.2s infinite;
        }

        @keyframes recordPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(232, 84, 84, .4);
            }

            50% {
                box-shadow: 0 0 0 14px rgba(232, 84, 84, 0);
            }
        }

        .btn-send {
            width: 42px;
            height: 42px;
            border-radius: var(--r-full);
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all .2s ease;
        }

        .btn-send:hover {
            background: var(--teal-600);
            transform: scale(1.05);
        }

        .btn-send:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
        }

        /* Recording status */
        .recording-status {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: .8rem;
            color: var(--coral-500);
            font-weight: 600;
            padding: 8px 0;
        }

        .recording-status.active {
            display: flex;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e85454;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* Welcome state */
        .chat-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
            text-align: center;
            color: var(--text-muted);
        }

        .chat-welcome .welcome-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: .5;
        }

        .chat-welcome h3 {
            color: var(--ink);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .chat-welcome p {
            font-size: .85rem;
            max-width: 320px;
            line-height: 1.7;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            align-items: center;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce .9s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: .15s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: .3s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: .4;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* Concerns panel for family */
        .concerns-card {
            background: white;
            border-radius: var(--r-xl);
            border: 1px solid var(--border);
            padding: 24px;
            margin-top: 24px;
        }

        .concern-tag {
            display: inline-block;
            padding: 5px 14px;
            border-radius: var(--r-full);
            font-size: .78rem;
            font-weight: 600;
            margin: 3px 4px 3px 0;
        }

        .concern-tag.worry {
            background: var(--coral-50);
            color: var(--coral-500);
        }

        .concern-tag.physical {
            background: var(--blue-50);
            color: var(--blue-500);
        }

        .concern-tag.need {
            background: var(--green-50);
            color: var(--green-500);
        }

        .tts-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--plum-50);
            border: 1px solid var(--plum-200);
            padding: 4px 10px;
            color: var(--plum-500);
            border-radius: var(--r-full);
            font-size: .82rem;
            font-weight: 600;
        }

        /* ── Emotion Detection Bar ── */
        .emotion-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; border-radius: var(--r-lg);
            border: 1px solid var(--cloud); background: var(--snow);
            margin-top: 10px; transition: all .4s ease;
            font-size: .82rem;
        }
        .emotion-emoji { font-size: 1.5rem; transition: all .3s; }
        .emotion-label { font-weight: 700; font-size: .88rem; }
        .emotion-hint  { color: var(--ash); flex: 1; }
        .emotion-bar.distress {
            background: rgba(239,68,68,.06);
            border-color: rgba(239,68,68,.3);
            animation: warm-glow 2s infinite;
        }
        .emotion-history {
            display: flex; gap: 4px; align-items: center;
        }
        .emotion-dot {
            width: 10px; height: 10px; border-radius: 50%;
            opacity: .7;
        }
        .nursing-alert {
            display: none; margin-top: 8px; padding: 10px 14px;
            background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25);
            border-radius: var(--r-lg); font-size: .8rem; color: var(--danger);
            font-weight: 600; animation: fade-in-up .4s ease;
        }
    </style>
</head>

<body>

    <div class="app-layout">

                <nav class="sidebar-nav">
                    <a href="dashboard.html"><span class="nav-icon">◉</span> 监护面板</a>

    <div class="toast-container" id="toast-container"></div>
    <script src="js/auth.js"></script>
    <script>
        let currentPatientId = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingTimer = null;
        let recordingSeconds = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = getUser();
            if (!user) return;

            if (user.role === 'admin' || user.role === 'doctor') {
                await loadPatientSelector();
            } else if (user.patient_id) {
                currentPatientId = user.patient_id;
            } else if (user.role === 'family') {
                // Family: load linked patient
                await loadFamilyPatient();
            }

            if (currentPatientId) {
                loadPatientName(currentPatientId);
                loadConversationHistory(currentPatientId);
            }
        });

        async function loadPatientSelector() {
            const res = await apiFetch('/api/patients');
            if (!res) return;
            const patients = await res.json();
            if (patients.length === 0) return;

            const selector = document.getElementById('patient-selector');
            const select = document.getElementById('patient-select');
            selector.style.display = 'block';

            select.innerHTML = patients.map(p =>
                `<option value="${p.id}">${p.name} - ${p.bed_number} - ${p.disease_type}</option>`
            ).join('');

            currentPatientId = patients[0].id;
        }

        async function loadFamilyPatient() {
            const res = await apiFetch('/api/patients');
            if (!res) return;
            const patients = await res.json();
            if (patients.length > 0) {
                currentPatientId = patients[0].id || patients[0];
            }
        }

        async function switchPatient(id) {
            currentPatientId = parseInt(id);
            loadPatientName(currentPatientId);
            loadConversationHistory(currentPatientId);
        }

        async function loadPatientName(patientId) {
            const res = await apiFetch(`/api/patients/${patientId}`);
            if (!res) return;
            const data = await res.json();
            const name = data.patient ? data.patient.name : (data.name || '患者');
            document.getElementById('chat-patient-name').textContent = name;
        }

        async function loadConversationHistory(patientId) {
            const res = await apiFetch(`/api/voice/conversations/${patientId}?limit=50`);
            if (!res) return;
            const messages = await res.json();
            const chatArea = document.getElementById('chat-area');
            const welcome = document.getElementById('chat-welcome');

            if (messages.length === 0) {
                welcome.style.display = 'flex';
                return;
            }

            welcome.style.display = 'none';
            chatArea.innerHTML = messages.map(m => createMessageHTML(m.role, m.content, m.created_at)).join('');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function createMessageHTML(role, content, time) {
            const isUser = role === 'user';
            return `
                <div class="chat-msg ${role}">
                    <div class="msg-avatar ${isUser ? 'user-av' : 'ai-av'}">${isUser ? '👤' : '🤖'}</div>
                    <div>
                        <div class="msg-bubble">${content}</div>
                        <div class="msg-time">${time ? formatDateTime(time) : '刚刚'}</div>
                    </div>
                </div>`;
        }

        function showTyping() {
            const chatArea = document.getElementById('chat-area');
            const typing = document.createElement('div');
            typing.id = 'typing-indicator';
            typing.className = 'chat-msg assistant';
            typing.innerHTML = `
                <div class="msg-avatar ai-av">🤖</div>
                <div class="msg-bubble">
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>`;
            chatArea.appendChild(typing);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTyping() {
            document.getElementById('typing-indicator')?.remove();
        }

        // ─── Voice Recording ───
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    await processAudio(audioBlob);
                };

                mediaRecorder.start();
                isRecording = true;
                document.getElementById('btn-record').classList.add('recording');
                document.getElementById('btn-record').innerHTML = '⏹';
                document.getElementById('recording-status').classList.add('active');

                recordingSeconds = 0;
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const mins = String(Math.floor(recordingSeconds / 60)).padStart(2, '0');
                    const secs = String(recordingSeconds % 60).padStart(2, '0');
                    document.getElementById('recording-time').textContent = `${mins}:${secs}`;
                }, 1000);

            } catch (err) {
                showToast('无法访问麦克风，请检查浏览器权限', 'error');
                console.error('Mic error:', err);
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('btn-record').classList.remove('recording');
                document.getElementById('btn-record').innerHTML = '🎤';
                document.getElementById('recording-status').classList.remove('active');
                clearInterval(recordingTimer);
            }
        }

        function getSupportedMimeType() {
            const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
            for (const type of types) {
                if (MediaRecorder.isTypeSupported(type)) return type;
            }
            return 'audio/webm';
        }

        async function processAudio(audioBlob) {
            showToast('语音识别中…', 'info');

            // Convert blob to base64
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                const format = audioBlob.type.includes('webm') ? 'webm' : audioBlob.type.includes('ogg') ? 'ogg' : 'wav';

                try {
                    const res = await apiFetch('/api/voice/transcribe', {
                        method: 'POST',
                        body: JSON.stringify({ audio: base64Audio, format })
                    });

                    if (!res) return;
                    const data = await res.json();

                    if (data.error) {
                        showToast('语音识别失败: ' + data.error, 'error');
                        return;
                    }

                    if (data.text && data.text.trim()) {
                        document.getElementById('text-input').value = data.text.trim();
                        showToast('识别成功！', 'success');
                        // Auto-send
                        sendTextMessage();
                    } else {
                        showToast('未识别到语音内容，请重试', 'warning');
                    }
                } catch (err) {
                    showToast('语音识别请求失败', 'error');
                }
            };
            reader.readAsDataURL(audioBlob);
        }

        // ─── Emotion Detection ───
        let _emotionHistory = [];  // recent emotion strings
        const _emotionColors = {
            pain:'#ef4444', anxious:'#f59e0b', sad:'#6366f1',
            lonely:'#ec4899', tired:'#8b5cf6',
            happy:'#22c55e', calm:'#14b8a6', neutral:'#14b8a6'
        };

        async function detectEmotion(text) {
            try {
                const r = await apiFetch('/api/emotion/analyze', {
                    method: 'POST',
                    body: JSON.stringify({
                        text,
                        patient_id: currentPatientId,
                        history_emotions: _emotionHistory.slice(-3)
                    })
                });
                if (!r) return;
                const d = await r.json();

                // Update history
                _emotionHistory.push(d.emotion);
                if (_emotionHistory.length > 10) _emotionHistory.shift();

                // Update UI
                const bar = document.getElementById('emotion-bar');
                document.getElementById('emotion-emoji').textContent = d.emoji;
                document.getElementById('emotion-label').textContent = d.label;
                document.getElementById('emotion-hint').textContent =
                    ` · ${d.nursing_suggestion.slice(0,30)}…`;
                bar.style.borderColor = d.color + '55';
                bar.style.background  = d.color + '10';

                // History dots
                const hist = document.getElementById('emotion-history');
                hist.innerHTML = _emotionHistory.slice(-5).map(e =>
                    `<div class="emotion-dot" style="background:${_emotionColors[e]||'#ccc'}"></div>`
                ).join('');

                // Distress alert
                const alertEl = document.getElementById('nursing-alert');
                if (d.needs_alert) {
                    bar.classList.add('distress');
                    alertEl.style.display = 'block';
                    alertEl.innerHTML = `🚨 <strong>护理提示：</strong>${d.nursing_suggestion}`;
                } else {
                    bar.classList.remove('distress');
                    alertEl.style.display = 'none';
                }

                // Log to DB
                apiFetch('/api/emotion/log', {
                    method: 'POST',
                    body: JSON.stringify({
                        patient_id: currentPatientId,
                        emotion: d.emotion, label: d.label,
                        severity: d.severity,
                        text_snippet: text.slice(0, 80)
                    })
                });
            } catch(e) { /* non-blocking */ }
        }

        // ─── Text Message ───
        async function sendTextMessage() {
            const input = document.getElementById('text-input');
            const message = input.value.trim();
            if (!message || !currentPatientId) return;

            // Append user message without innerHTML +=
            function appendMsgNode(role, content, time) {
                const tmp = document.createElement('div');
                tmp.innerHTML = createMessageHTML(role, content, time);
                chatArea.appendChild(tmp.firstElementChild);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            input.value = '';

            // Hide welcome
            document.getElementById('chat-welcome').style.display = 'none';

            // Show user message
            appendMsgNode('user', message, null);

            // Detect emotion (non-blocking)
            detectEmotion(message);

            // Show typing
            showTyping();

            try {
                const res = await apiFetch('/api/voice/chat', {
                    method: 'POST',
                    body: JSON.stringify({ patient_id: currentPatientId, message })
                });

                removeTyping();

                if (!res) return;
                const data = await res.json();

                if (data.error) {
                    showToast('AI回复失败: ' + data.error, 'error');
                    return;
                }

                appendMsgNode('assistant', data.response, null);

            } catch (err) {
                removeTyping();
                showToast('发送失败，请重试', 'error');
            }
        }

        function showAllPatients() {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
