<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · 智能护理病床</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.88em' font-size='90'>⚕</text></svg>">
</head>

<body>
    <div class="login-page">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <div class="login-card" id="login-form-wrapper">
            <!-- Login -->
            <div id="login-form">
                <div class="mark">NB</div>
                <h1>欢迎回来</h1>
                <p class="subtitle">登录智能护理病床云平台</p>
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="login-username" placeholder="请输入用户名"
                        autocomplete="username">
                </div>
                <div class="form-group" style="text-align:left;">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="login-password" placeholder="请输入密码"
                        autocomplete="current-password">
                </div>
                <div id="login-error"
                    style="color:var(--danger);font-size:.82rem;margin-bottom:14px;display:none;text-align:left;"></div>
                <button class="btn btn-teal" style="width:100%;margin-bottom:16px;" onclick="handleLogin()">登 录</button>
                <p style="font-size:.85rem;color:var(--mist);">
                    还没有账号？<a href="#" onclick="showRegister()" style="color:var(--teal-500);font-weight:600;">立即注册</a>
                </p>
                <div
                    style="margin-top:24px;padding:14px 16px;background:var(--snow);border-radius:var(--r-lg);text-align:left;">
                    <div style="font-size:.75rem;font-weight:600;color:var(--ash);margin-bottom:6px;">演示账号</div>
                    <div style="font-size:.73rem;color:var(--mist);line-height:1.9;">
                        管理员 <code
                            style="background:var(--cloud);padding:1px 5px;border-radius:3px;font-size:.7rem;">admin</code>
                        / <code
                            style="background:var(--cloud);padding:1px 5px;border-radius:3px;font-size:.7rem;">admin123</code><br>
                        医生 <code
                            style="background:var(--cloud);padding:1px 5px;border-radius:3px;font-size:.7rem;">dr_wang</code>
                        / <code
                            style="background:var(--cloud);padding:1px 5px;border-radius:3px;font-size:.7rem;">doctor123</code><br>
                        患者 <code
                            style="background:var(--cloud);padding:1px 5px;border-radius:3px;font-size:.7rem;">patient_zhang</code>
                        / <code
                            style="background:var(--cloud);padding:1px 5px;border-radius:3px;font-size:.7rem;">patient123</code>
                    </div>
                </div>
            </div>

            <!-- Register -->
            <div id="register-form" style="display:none;">
                <div class="mark">NB</div>
                <h1>创建账号</h1>
                <p class="subtitle">注册智能护理病床云平台</p>
                <div class="form-group" style="text-align:left;"><label class="form-label">用户名</label><input type="text"
                        class="form-input" id="reg-username" placeholder="请设置用户名"></div>
                <div class="form-group" style="text-align:left;"><label class="form-label">真实姓名</label><input
                        type="text" class="form-input" id="reg-realname" placeholder="请输入真实姓名"></div>
                <div class="form-group" style="text-align:left;"><label class="form-label">手机号</label><input type="tel"
                        class="form-input" id="reg-phone" placeholder="请输入手机号"></div>
                <div class="form-group" style="text-align:left;"><label class="form-label">密码</label><input
                        type="password" class="form-input" id="reg-password" placeholder="至少6位"></div>
                <div class="form-group" style="text-align:left;"><label class="form-label">身份</label>
                    <select class="form-input" id="reg-role">
                        <option value="patient">患者</option>
                        <option value="family">家属</option>
                        <option value="doctor">医生</option>
                    </select>
                </div>
                <div id="reg-error"
                    style="color:var(--danger);font-size:.82rem;margin-bottom:14px;display:none;text-align:left;"></div>
                <button class="btn btn-teal" style="width:100%;margin-bottom:16px;" onclick="handleRegister()">注
                    册</button>
                <p style="font-size:.85rem;color:var(--mist);">已有账号？<a href="#" onclick="showLogin()"
                        style="color:var(--teal-500);font-weight:600;">返回登录</a></p>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
        if (window.location.hash === '#register') showRegister();
        function showRegister() { document.getElementById('login-form').style.display = 'none'; document.getElementById('register-form').style.display = 'block' }
        function showLogin() { document.getElementById('register-form').style.display = 'none'; document.getElementById('login-form').style.display = 'block' }
        async function handleLogin() {
            const u = document.getElementById('login-username').value.trim(), p = document.getElementById('login-password').value, e = document.getElementById('login-error');
            e.style.display = 'none';
            if (!u || !p) { e.textContent = '请输入用户名和密码'; e.style.display = 'block'; return }
            try {
                const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
                const d = await r.json(); if (!r.ok) { e.textContent = d.error || '登录失败'; e.style.display = 'block'; return }
                localStorage.setItem('token', d.token); localStorage.setItem('user', JSON.stringify(d.user)); window.location.href = 'dashboard.html';
            } catch (err) { e.textContent = '网络错误，请重试'; e.style.display = 'block' }
        }
        async function handleRegister() {
            const u = document.getElementById('reg-username').value.trim(), n = document.getElementById('reg-realname').value.trim(),
                ph = document.getElementById('reg-phone').value.trim(), p = document.getElementById('reg-password').value,
                ro = document.getElementById('reg-role').value, e = document.getElementById('reg-error'); e.style.display = 'none';
            if (!u || !p || p.length < 6) { e.textContent = '请填写用户名，密码至少6位'; e.style.display = 'block'; return }
            try {
                const r = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p, role: ro, real_name: n, phone: ph }) });
                const d = await r.json(); if (!r.ok) { e.textContent = d.error || '注册失败'; e.style.display = 'block'; return }
                alert('注册成功！请登录'); showLogin(); document.getElementById('login-username').value = u;
            } catch (err) { e.textContent = '网络错误'; e.style.display = 'block' }
        }
        document.getElementById('login-password').addEventListener('keyup', e => { if (e.key === 'Enter') handleLogin() });
        document.getElementById('reg-password').addEventListener('keyup', e => { if (e.key === 'Enter') handleRegister() });
    </script>
</body>

</html>
